    // ─── ÉCHANGES PUBLICS ──────────────────────────────────────────────────────
    let pubRarityFilter = '';
    let pubPokemonFilter = '';
    let pubUserFilter = '';

    async function renderPublicTrades(container, page, pokemon, user, rarity) {
        const old = document.getElementById('pubSection');
        if (old) old.remove();

        const skip = page * 20;
        const params = new URLSearchParams();
        if (pokemon) params.set('pokemon', pokemon);
        if (user)    params.set('user', user);
        if (rarity)  params.set('rarity', rarity);
        params.set('skip', skip);

        const pubSection = document.createElement('div');
        pubSection.className = 'trade-tab-section';
        pubSection.id        = 'pubSection';

        // Header titre
        const titleEl = document.createElement('div');
        titleEl.className = 'trade-tab-title';
        titleEl.innerHTML = '&#127760; MARCHÉ PUBLIC';
        pubSection.appendChild(titleEl);

        // Filtres
        const filtersEl = document.createElement('div');
        filtersEl.className = 'pub-filters';
        filtersEl.innerHTML = `
            <input class="pub-filter-input" type="text" id="pubPokemonInput"
                   placeholder="NOM POKÉMON..." value="${pokemon}"
                   oninput="onPubFilter()">
            <input class="pub-filter-input" type="text" id="pubUserInput"
                   placeholder="DRESSEUR..." value="${user}"
                   oninput="onPubFilter()">
            ${['Junk','Common','Uncommon','Rare','Epic','Legendary'].map(r =>
                `<button class="pub-rarity-btn r-${r} ${rarity===r?'active':''}"
                         onclick="togglePubRarity('${r}')">${r.slice(0,3).toUpperCase()}</button>`
            ).join('')}
            <span class="pub-count" id="pubCount"></span>
        `;
        pubSection.appendChild(filtersEl);

        // Contenu
        const listEl = document.createElement('div');
        listEl.id = 'pubList';
        listEl.style.padding = '8px 14px';
        pubSection.appendChild(listEl);
        container.appendChild(pubSection);

        // Chargement
        listEl.innerHTML = '<div class="trade-empty">CHARGEMENT...</div>';
        try {
            const res  = await fetch(`${API}/trade/public?${params}`);
            const data = await res.json();
            const trades = data.trades || [];
            const total  = data.total  || 0;

            document.getElementById('pubCount').innerText = `${total} ÉCHANGE${total > 1 ? 'S' : ''}`;
            listEl.innerHTML = '';

            if (trades.length === 0) {
                listEl.innerHTML = '<div class="trade-empty">AUCUN ÉCHANGE TROUVÉ</div>';
            } else {
                trades.forEach(t => {
                    const d = new Date(t.createdAt);
                    const dateStr = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                    const fromUrl = tradeSprite(t.fromSprite, t.fromCatchName);
                    const toUrl   = tradeSprite(t.toSprite,   t.toCatchName);
                    const rarityColors = { Junk:'#888', Common:'#ddd', Uncommon:'#1fdf64', Rare:'#00d2ff', Epic:'#cc66ff', Legendary:'#ffae00' };
                    const fromColor = rarityColors[t.fromRarity] || '#555';
                    const toColor   = rarityColors[t.toRarity]   || '#555';

                    const item = document.createElement('div');
                    item.className = 'pub-trade-item';
                    item.innerHTML = `
                        <div class="pub-trade-sprites">
                            <div style="text-align:center">
                                <img class="pub-trade-sprite" src="${fromUrl}"
                                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                                <div style="font-size:5px;color:${fromColor};margin-top:2px">${t.fromCatchName}</div>
                            </div>
                            <div class="pub-trade-arrow">&#8652;</div>
                            <div style="text-align:center">
                                <img class="pub-trade-sprite" src="${toUrl}"
                                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                                <div style="font-size:5px;color:${toColor};margin-top:2px">${t.toCatchName}</div>
                            </div>
                        </div>
                        <div class="pub-trade-info">
                            <div class="pub-trade-names">
                                <span style="color:#fff">${t.from}</span>
                                <span style="color:#555"> ↔ </span>
                                <span style="color:#fff">${t.to}</span>
                            </div>
                            <div class="pub-trade-meta">📅 ${dateStr}</div>
                            <div style="display:flex;gap:6px;margin-top:4px;align-items:center">
                                <span style="font-size:5px;color:#ffae00">${t.fromValue||0}₽</span>
                                <span style="font-size:5px;color:#555">↔</span>
                                <span style="font-size:5px;color:#ffae00">${t.toValue||0}₽</span>
                                ${t.status === 'accepted'
                                    ? '<span style="font-size:5px;background:#0a2a0a;color:#1fdf64;padding:2px 5px;border-radius:2px">✓ ÉCHANGÉ</span>'
                                    : '<span style="font-size:5px;background:#1a1a00;color:#ffae00;padding:2px 5px;border-radius:2px">⏳ EN ATTENTE</span>'
                                }
                            </div>
                        </div>
                        ${t.status === 'pending' && currentUser && currentUser.username.toLowerCase() === t.to.toLowerCase() ? `
                        <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0">
                            <button class="btn-accept" onclick="respondTrade('${t._id}','accept')">✓</button>
                            <button class="btn-refuse" onclick="respondTrade('${t._id}','refuse')">✗</button>
                        </div>` : t.status === 'pending' && currentUser && currentUser.username.toLowerCase() === t.from.toLowerCase() ? `
                        <button class="btn-cancel" onclick="respondTrade('${t._id}','cancel')">ANNULER</button>
                        ` : ''}
                    `;
                    listEl.appendChild(item);
                });

                // Pagination
                if (total > 20) {
                    const totalPages = Math.ceil(total / 20);
                    const nav = document.createElement('div');
                    nav.className = 'hist-nav';
                    const btnPrev = document.createElement('button');
                    btnPrev.className = 'page-btn'; btnPrev.innerHTML = '&#9664; PRÉC'; btnPrev.disabled = page === 0;
                    btnPrev.onclick = () => renderPublicTrades(container, page-1, pubPokemonFilter, pubUserFilter, pubRarityFilter);
                    const label = document.createElement('span');
                    label.className = 'page-info'; label.innerText = (page+1) + ' / ' + totalPages;
                    const btnNext = document.createElement('button');
                    btnNext.className = 'page-btn'; btnNext.innerHTML = 'SUIV &#9654;'; btnNext.disabled = page >= totalPages-1;
                    btnNext.onclick = () => renderPublicTrades(container, page+1, pubPokemonFilter, pubUserFilter, pubRarityFilter);
                    nav.append(btnPrev, label, btnNext);
                    listEl.appendChild(nav);
                }
            }
        } catch {
            listEl.innerHTML = '<div class="trade-empty">ERREUR CHARGEMENT</div>';
        }
    }

    let pubFilterTimer = null;
    function onPubFilter() {
        clearTimeout(pubFilterTimer);
        pubFilterTimer = setTimeout(() => {
            pubPokemonFilter = (document.getElementById('pubPokemonInput')?.value || '').trim();
            pubUserFilter    = (document.getElementById('pubUserInput')?.value || '').trim();
            const container  = document.getElementById('mainContainer');

    function togglePubRarity(rarity) {
        pubRarityFilter = pubRarityFilter === rarity ? '' : rarity;
        document.querySelectorAll('.pub-rarity-btn').forEach(b => {
            b.classList.toggle('active', b.classList.contains('r-' + pubRarityFilter));

    async function renderHistorySection(container, page) {
        const old = document.getElementById('histSection');
        if (old) old.remove();
        const skip      = page * 30;
        const histRes   = await fetch(API + '/trade/history/' + currentUser.username + '?skip=' + skip, { headers: { 'Authorization': 'Bearer ' + localStorage.getItem('jwt') } });
        const histData  = await histRes.json();
        const total     = histData.total || 0;
        const totalPages = Math.ceil(total / 30) || 1;
        const histSection = document.createElement('div');
        histSection.className = 'trade-tab-section';
        histSection.id        = 'histSection';
        histSection.innerHTML = '<div class="trade-tab-title">&#128196; HISTORIQUE (' + total + ')</div>';
        if (total === 0) {
            histSection.innerHTML += '<div class="trade-empty">AUCUN ÉCHANGE TERMINÉ</div>';
        } else {
            histData.history.forEach(function(t) {
                const isMine = t.from.toLowerCase() === currentUser.username.toLowerCase();
                const other  = isMine ? t.to : t.from;
                const d      = new Date(t.completedAt || t.createdAt);
                const date   = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                const statusLabels = { accepted:'✓ ACCEPTÉ', refused:'✗ REFUSÉ', cancelled:'✕ ANNULÉ' };
                const item   = document.createElement('div');
                item.className = 'trade-history-item ' + t.status;
                const fromSrc = tradeSprite(t.fromSprite, t.fromCatchName);
                const toSrc   = tradeSprite(t.toSprite,   t.toCatchName);
                item.innerHTML = '<div class="trade-item-sprites"><img class="trade-item-sprite" src="' + fromSrc + '" onerror="this.onerror=null;this.src=\'' + DEFAULT_IMG + '\'"><div class="trade-item-arrow">&#8652;</div><img class="trade-item-sprite" src="' + toSrc + '" onerror="this.onerror=null;this.src=\'' + DEFAULT_IMG + '\'"></div><div class="trade-item-info"><div class="trade-item-names">' + t.fromCatchName + ' ↔ ' + t.toCatchName + '</div><div class="trade-item-meta">' + (isMine ? 'AVEC : ' : 'DE : ') + other + ' • ' + date + '</div></div><span class="trade-history-status status-' + t.status + '">' + statusLabels[t.status] + '</span>';
                histSection.appendChild(item);
            });
            if (total > 30) {
                const nav = document.createElement('div');
                nav.className = 'hist-nav';
                const btnPrev = document.createElement('button');
                btnPrev.className = 'page-btn'; btnPrev.innerHTML = '&#9664; PRÉC'; btnPrev.disabled = page === 0;
                btnPrev.onclick = function() { renderHistorySection(container, page - 1); };
                const label = document.createElement('span');
                label.className = 'page-info'; label.innerText = (page + 1) + ' / ' + totalPages;
                const btnNext = document.createElement('button');
                btnNext.className = 'page-btn'; btnNext.innerHTML = 'SUIV &#9654;'; btnNext.disabled = page >= totalPages - 1;
                btnNext.onclick = function() { renderHistorySection(container, page + 1); };
                nav.append(btnPrev, label, btnNext);
                histSection.appendChild(nav);
            }
        }
        container.appendChild(histSection);
    }

    function createTradeItem(t, type) {
        const item = document.createElement('div');
        item.className = 'trade-item';
        const d       = new Date(t.createdAt);
        const dateStr = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
        const safeId  = 'ta_' + String(t._id);
        item.innerHTML = `
            <div class="trade-item-sprites">
                <img class="trade-item-sprite" src="${tradeSprite(t.fromSprite, t.fromCatchName)}"
                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                <div class="trade-item-arrow">&#8652;</div>
                <img class="trade-item-sprite" src="${tradeSprite(t.toSprite, t.toCatchName)}"
                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
            </div>
            <div class="trade-item-info">
                <div class="trade-item-names">${t.fromCatchName} ↔ ${t.toCatchName}</div>
                <div class="trade-item-meta">${type === 'received' ? 'DE : ' + t.from : 'POUR : ' + t.to} • ${dateStr}</div>
            </div>
            <div class="trade-item-actions" id="${safeId}"></div>
        `;
        const actions = item.querySelector(`#${safeId}`);
        if (type === 'received') {
            actions.innerHTML = `
                <button class="btn-accept" onclick="respondTrade('${t._id}','accept')">✓</button>
                <button class="btn-refuse" onclick="respondTrade('${t._id}','refuse')">✗</button>
            `;
        } else {
            actions.innerHTML = `<button class="btn-cancel" onclick="respondTrade('${t._id}','cancel')">ANNULER</button>`;
        }
        return item;
    }

    async function respondTrade(tradeId, action) {
        const endpoint = action === 'accept' ? '/trade/accept' : action === 'refuse' ? '/trade/refuse' : '/trade/cancel';
        try {
            const res  = await fetch(`${API}${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('jwt')}` },
                body: JSON.stringify({ tradeId })
            });
            const data = await res.json();
            if (data.success) {
                const msgs = { accept: '✅ Échange effectué !', refuse: '❌ Échange refusé.', cancel: '🚫 Échange annulé.' };
                alert(msgs[action]);
                renderTradeTab();
                if (action === 'accept') fetchAllData();
            } else {
                alert('Erreur : ' + (data.error || 'Inconnue'));
            }
        } catch { alert('Erreur serveur'); }
    }

    // ─── TOGGLE REFUS ÉCHANGE ─────────────────────────────────────────────────
    async function toggleTradeRefused(catchId, btn) {
        try {
            const res  = await fetch(`${API}/catch/toggle-trade/${catchId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt')}` }
            });
            const data = await res.json();
            if (data.success) {
                const refused = data.tradeRefused;
                btn.className = `btn-toggle-trade ${refused ? 'closed' : 'open'}`;
                btn.innerText = refused ? '🔒 REFUSÉ' : '✅ AUTORISÉ';
                // Mettre à jour dans userCatches pour que la carte se mette à jour
                userCatches.forEach(c => {
                    if (String(c._id) === String(catchId)) c.tradeRefused = refused;
                });
                renderDisplay();
            } else {
                alert('Erreur : ' + (data.error || 'Inconnue'));
            }
        } catch {
            alert('Erreur serveur');
        }
    }

    // ─── UTILS ─────────────────────────────────────────────────────────────────
    function setStatus(msg) { document.getElementById('status').innerText = msg; }
</script>
</body>
</html>
