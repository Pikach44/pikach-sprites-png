<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="max-age=86400">
    <title>Pikach-DEX</title>
    <link rel="icon" href="https://pikach44.github.io/pikach-sprites-png/pokeball.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --red: #cc0000;
            --red-dark: #880000;
            --red-light: #ff4444;
            --bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --rarity-junk: #888888;
            --rarity-common: #dddddd;
            --rarity-uncommon: #1fdf64;
            --rarity-rare: #00d2ff;
            --rarity-epic: #cc66ff;
            --rarity-legendary: #ffae00;
        }

        body {
            font-family: 'Press Start 2P', monospace;
            background: #111;
            color: #fff;
            min-height: 100vh;
            padding: 16px;
            zoom: 1.5;
        }

        /* Scanlines */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,0,0,0.07) 0px, rgba(0,0,0,0.07) 1px, transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 9999;
        }

        /* Layout */
        .wrap { max-width: 960px; margin: 0 auto; background: #1a0000; border: 4px solid var(--red); border-radius: 10px; overflow: hidden; }

        /* Topbar */
        .topbar { background: var(--red); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--red-dark); }
        .topbar-title { font-size: 10px; color: #fff; letter-spacing: 1px; text-shadow: 2px 2px 0 var(--red-dark); }
        .pokeballs { display: flex; gap: 7px; align-items: center; }
        .pokeball { width: 20px; height: 20px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.8); background: linear-gradient(to bottom, #fff 0%, #fff 48%, #333 48%, #333 52%, var(--red) 52%, var(--red) 100%); position: relative; }
        .pokeball::after { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 6px; height: 6px; background: white; border-radius: 50%; border: 1.5px solid #333; }

        /* Tabs */
        .tabs-row { display: flex; background: #111; border-bottom: 2px solid var(--red); }
        .tab-btn { flex: 1; text-align: center; padding: 9px 4px; font-family: 'Press Start 2P', monospace; font-size: 7px; color: #555; cursor: pointer; letter-spacing: 0.5px; border: none; border-right: 1px solid #222; background: transparent; transition: background 0.15s, color 0.15s; }
        .tab-btn:last-child { border-right: none; }
        .tab-btn:hover { color: #aaa; background: #1a0000; }
        .tab-btn.active { background: var(--red); color: #fff; }

        /* Search */
        .search-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: var(--bg); border-bottom: 1px solid #2a0000; flex-wrap: wrap; }
        .btn-all { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 6px 9px; background: #111; color: var(--red); border: 2px solid var(--red); cursor: pointer; border-radius: 3px; letter-spacing: 0.5px; transition: background 0.15s; white-space: nowrap; }
        .btn-all:hover { background: #2a0000; }
        .search-input { flex: 1; min-width: 120px; font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 7px 10px; background: #111; color: #fff; border: 2px solid #333; border-radius: 3px; outline: none; letter-spacing: 0.5px; transition: border-color 0.15s; }
        .search-input:focus { border-color: var(--red); }
        .search-input::placeholder { color: #333; }
        .btn-search { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 7px 12px; background: var(--red); color: #fff; border: 2px solid var(--red-light); cursor: pointer; border-radius: 3px; letter-spacing: 0.5px; text-shadow: 1px 1px 0 var(--red-dark); transition: opacity 0.15s; white-space: nowrap; }
        .btn-search:hover { opacity: 0.85; }
        .btn-search:active { transform: scale(0.97); }

        /* Gen bar */
        .gen-bar { display: none; flex-wrap: wrap; gap: 6px; padding: 10px 14px; background: #111; border-bottom: 1px solid #2a0000; }
        .gen-btn { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 5px 10px; background: #1a1a1a; color: #555; border: 1px solid #333; cursor: pointer; border-radius: 2px; letter-spacing: 0.5px; transition: all 0.15s; }
        .gen-btn:hover { border-color: var(--red); color: #aaa; }
        .gen-btn.active { background: var(--red); color: #fff; border-color: var(--red-light); }

        /* Stats bar */
        .stats-bar { background: #111; border-bottom: 1px solid #2a0000; padding: 8px 14px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
        .stat-dex { font-size: 7px; color: var(--red); letter-spacing: 0.5px; }
        .rarity-pills { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; }
        .pill { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 5px 9px; border-radius: 2px; letter-spacing: 0.5px; }
        .pill-doublon   { background: #1a1a2a; color: #aaaaff; border: 1px solid #aaaaff; cursor: pointer; }
        .pill-doublon.active { background: #aaaaff; color: #000; }
        .pill-Junk      { background: #222; color: var(--rarity-junk); }
        .pill-Common    { background: #222; color: var(--rarity-common); }
        .pill-Uncommon  { background: #1a3a1a; color: var(--rarity-uncommon); }
        .pill-Rare      { background: #001a2a; color: var(--rarity-rare); }
        .pill-Epic      { background: #1a0033; color: var(--rarity-epic); }
        .pill-Legendary { background: #332200; color: var(--rarity-legendary); }

        /* Status */
        #status { text-align: center; padding: 6px; font-size: 6px; color: #444; background: var(--bg); letter-spacing: 0.5px; min-height: 24px; border-bottom: 1px solid #1a0000; }

        /* Inventory controls */
        .inv-controls { display: none; align-items: center; gap: 8px; padding: 8px 14px; background: #0d0d0d; border-bottom: 1px solid #2a0000; flex-wrap: wrap; }
        .filter-input { flex: 1; min-width: 120px; font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 6px 10px; background: #111; color: #fff; border: 2px solid #333; border-radius: 3px; outline: none; transition: border-color 0.15s; }
        .filter-input:focus { border-color: var(--red); }
        .filter-input::placeholder { color: #333; }
        .sort-select { font-family: 'Press Start 2P', monospace; font-size: 9px; padding: 6px 8px; background: #111; color: #aaa; border: 2px solid #333; border-radius: 3px; outline: none; cursor: pointer; }
        .sort-select:focus { border-color: var(--red); }
        .total-value { font-size: 7px; color: #ffae00; letter-spacing: 0.5px; white-space: nowrap; }

        /* Card grid */
        .inventory { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; padding: 12px; background: var(--bg); }

        /* Card */
        .card { background: var(--card-bg); border: 2px solid #2a2a2a; border-radius: 4px; padding: 8px 6px 6px; text-align: center; position: relative; transition: border-color 0.15s, background 0.15s; }
        .card:hover { border-color: var(--red); background: #1f0000; }
        .corner-dot { position: absolute; top: 4px; right: 4px; width: 5px; height: 5px; border-radius: 50%; z-index: 2; }

        .badge-count { position: absolute; bottom: 4px; left: 4px; font-size: 6px; background: #222; color: #aaa; padding: 2px 5px; border-radius: 2px; letter-spacing: 0.5px; z-index: 2; }
        .badge-owned { position: absolute; top: 4px; left: 4px; width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.7); background: linear-gradient(to bottom, #fff 0%, #fff 45%, #333 45%, #333 55%, var(--red) 55%, var(--red) 100%); z-index: 2; }
        .badge-owned::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:4px; height:4px; background:#fff; border-radius:50%; border:1px solid #333; }

        .sprite-container { background: #111; border-radius: 3px; height: 76px; display: flex; align-items: center; justify-content: center; margin-bottom: 7px; position: relative; }
        .sprite-container img { max-width: 64px; max-height: 64px; object-fit: contain; transition: transform 0.2s; image-rendering: pixelated; position: relative; z-index: 0; }
        .card:hover .sprite-container img { transform: scale(1.1); }
        .card-name { font-size: 8px; letter-spacing: 0.3px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.6; }
        .card-val { font-size: 8px; color: #666; display: flex; align-items: center; justify-content: center; gap: 2px; line-height: 1; }
        .card-currency { color: #886633; font-size: 7px; }

        .not-owned .sprite-container img { filter: brightness(0); opacity: 0.2; }
        .not-owned .card-name { color: #2a2a2a !important; }
        .not-owned .card-val  { display: none; }
        .not-owned:hover { border-color: #333; background: var(--card-bg); }

        /* Rarity colors */
        .rarity-Junk      { color: var(--rarity-junk); }
        .rarity-Common    { color: var(--rarity-common); }
        .rarity-Uncommon  { color: var(--rarity-uncommon); }
        .rarity-Rare      { color: var(--rarity-rare); }
        .rarity-Epic      { color: var(--rarity-epic); }
        .rarity-Legendary { color: var(--rarity-legendary); }
        .dot-Junk      { background: var(--rarity-junk); }
        .dot-Common    { background: var(--rarity-common); }
        .dot-Uncommon  { background: var(--rarity-uncommon); }
        .dot-Rare      { background: var(--rarity-rare); }
        .dot-Epic      { background: var(--rarity-epic); }
        .dot-Legendary { background: var(--rarity-legendary); }

        /* Tooltip */
        .card-tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--red); border-radius: 3px; padding: 7px 10px; font-size: 8px; color: #ccc; white-space: nowrap; z-index: 10; pointer-events: none; }
        .card:hover .card-tooltip { display: block; }

        /* Bottombar */
        .bottombar { background: var(--red); border-top: 3px solid var(--red-dark); padding: 7px 14px; display: flex; justify-content: space-between; align-items: center; }
        .bottombar span { font-size: 6px; color: rgba(255,255,255,0.65); letter-spacing: 0.5px; }

        /* Pagination */
        .pagination { display: none; justify-content: center; align-items: center; gap: 10px; padding: 12px; background: var(--bg); border-top: 1px solid #2a0000; }
        .pagination.visible { display: flex; }
        .page-btn { font-family: 'Press Start 2P', monospace; font-size: 8px; padding: 7px 14px; background: #111; color: #aaa; border: 2px solid #333; cursor: pointer; border-radius: 3px; transition: all 0.15s; }
        .page-btn:hover { border-color: var(--red); color: #fff; }
        .page-btn:disabled { opacity: 0.25; cursor: default; border-color: #222; color: #444; }
        .page-info { font-size: 7px; color: #555; letter-spacing: 0.5px; min-width: 80px; text-align: center; }

        /* Leaderboard */
        .lb-controls { display: none; gap: 6px; padding: 10px 14px; background: #0d0d0d; border-bottom: 1px solid #2a0000; flex-wrap: wrap; align-items: center; justify-content: center; }
        .lb-sort-btn { font-family: 'Press Start 2P', monospace; font-size: 7px; padding: 6px 10px; background: #111; color: #555; border: 1px solid #333; cursor: pointer; border-radius: 2px; letter-spacing: 0.5px; transition: all 0.15s; }
        .lb-sort-btn:hover { border-color: var(--red); color: #aaa; }
        .lb-sort-btn.active { background: var(--red); color: #fff; border-color: var(--red-light); }
        .lb-search { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 6px 10px; background: #111; color: #fff; border: 1px solid #333; border-radius: 2px; outline: none; width: 140px; }
        .lb-search:focus { border-color: var(--red); }
        .lb-search::placeholder { color: #333; }
        .lb-autocomplete-wrap { position: relative; display: inline-block; }
        .search-autocomplete-wrap { position: relative; flex: 1; min-width: 120px; }
        .lb-autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: #111; border: 1px solid var(--red); border-top: none; border-radius: 0 0 3px 3px; z-index: 100; max-height: 180px; overflow-y: auto; }
        .lb-autocomplete-item { font-family: 'Press Start 2P', monospace; font-size: 6px; padding: 7px 10px; color: #aaa; cursor: pointer; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #1a1a1a; white-space: nowrap; }
        .lb-autocomplete-item:last-child { border-bottom: none; }
        .lb-autocomplete-item:hover, .lb-autocomplete-item.active { background: #1f0000; color: #fff; }
        .lb-autocomplete-item img { width: 20px; height: 20px; object-fit: contain; image-rendering: pixelated; flex-shrink: 0; }
        .lb-autocomplete-highlight { color: var(--red); }
        /* Podium */
        .lb-podium { display: flex; align-items: flex-end; justify-content: center; gap: 10px; padding: 20px 14px 0; background: var(--bg); }
        .lb-podium-item { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: transform 0.15s; }
        .lb-podium-item:hover { transform: translateY(-4px); }
        .lb-podium-card { border-radius: 6px; padding: 10px 8px; text-align: center; width: 110px; border: 2px solid #2a2a2a; }
        .lb-podium-card.rank-1 { background: linear-gradient(180deg, #332200 0%, #1a1200 100%); border-color: #ffae00; box-shadow: 0 0 16px rgba(255,174,0,0.25); }
        .lb-podium-card.rank-2 { background: linear-gradient(180deg, #1e1e1e 0%, #111 100%); border-color: #aaaaaa; }
        .lb-podium-card.rank-3 { background: linear-gradient(180deg, #1e1e1e 0%, #111 100%); border-color: #cd7f32; }
        .lb-podium-crown { font-size: 14px; margin-bottom: 4px; }
        .lb-podium-sprite { width: 56px; height: 56px; object-fit: contain; image-rendering: pixelated; }
        .lb-podium-name { font-size: 6px; color: #fff; margin: 6px 0 3px; letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 95px; }
        .lb-podium-val  { font-size: 7px; color: #ffae00; }
        .lb-podium-sub  { font-size: 5px; color: #555; margin-top: 2px; }
        .lb-podium-base { border-radius: 3px 3px 0 0; width: 110px; }
        .lb-podium-base.rank-1 { background: #ffae00; height: 14px; }
        .lb-podium-base.rank-2 { background: #888888; height: 9px; }
        .lb-podium-base.rank-3 { background: #cd7f32; height: 5px; }
        .lb-podium-streak { font-size: 6px; margin-top: 3px; }
        /* Table leaderboard */
        .lb-global-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 14px; background: var(--bg); border-bottom: 1px solid #2a0000; }
        .lb-stat-card { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; padding: 10px 12px; text-align: center; position: relative; overflow: hidden; }
        .lb-stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
        .lb-stat-card.s-red::before    { background: var(--red); }
        .lb-stat-card.s-gold::before   { background: #ffae00; }
        .lb-stat-card.s-blue::before   { background: #00d2ff; }
        .lb-stat-card.s-purple::before { background: #cc66ff; }
        .lb-stat-label { font-family: 'Press Start 2P', monospace; font-size: 5px; color: #555; letter-spacing: 0.5px; margin-bottom: 8px; }
        .lb-stat-value { font-family: 'Press Start 2P', monospace; font-size: 9px; margin-bottom: 4px; }
        .lb-stat-value.s-red    { color: var(--red); }
        .lb-stat-value.s-gold   { color: #ffae00; }
        .lb-stat-value.s-blue   { color: #00d2ff; }
        .lb-stat-value.s-purple { color: #cc66ff; }
        .lb-stat-sub { font-family: 'Press Start 2P', monospace; font-size: 5px; color: #444; }
        .lb-stat-sprite { width: 32px; height: 32px; object-fit: contain; image-rendering: pixelated; display: block; margin: 4px auto 0; }
        .lb-table-wrap { padding: 10px 14px 14px; background: var(--bg); }
        .lb-table { width: 100%; border-collapse: collapse; font-size: 8px; }
        .lb-table th { background: #111; color: #555; padding: 7px 10px; text-align: left; border-bottom: 1px solid #2a0000; font-size: 6px; letter-spacing: 0.5px; white-space: nowrap; cursor: pointer; transition: color 0.15s; user-select: none; }
        .lb-table th:hover { color: #aaa; }
        .lb-table th.sorted { color: var(--red); }
        .lb-table td { padding: 7px 10px; border-bottom: 1px solid #1a1a1a; vertical-align: middle; white-space: nowrap; }
        .lb-table tr:hover td { background: #1f0000; cursor: pointer; }
        .lb-rank { color: #555; font-size: 6px; width: 28px; }
        .lb-username { color: #fff; font-size: 7px; }
        .lb-val { color: #aaa; font-size: 6px; text-align: right; }
        .lb-val.highlight { color: var(--rarity-legendary); }
        .lb-sprite { width: 28px; height: 28px; object-fit: contain; image-rendering: pixelated; }
        .lb-best { display: flex; align-items: center; gap: 6px; }
        .lb-completion-wrap { display: flex; align-items: center; gap: 5px; }
        .lb-completion-bar { width: 50px; height: 4px; background: #222; border-radius: 2px; overflow: hidden; }
        .lb-completion-fill { height: 100%; background: var(--red); border-radius: 2px; }
        .lb-streak-val { font-size: 6px; }
        .lb-streak-val.hot  { color: #ff4400; }
        .lb-streak-val.warm { color: #ffae00; }
        .lb-streak-val.cold { color: #444; }

        /* Profile overlay */
        .profile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 16px; }
        .profile-overlay.open { display: flex; }
        .profile-box { background: #1a0000; border: 3px solid var(--red); border-radius: 10px; width: 100%; max-width: 700px; max-height: 90vh; overflow-y: auto; }
        .profile-header { background: var(--red); padding: 10px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--red-dark); }
        .profile-title { font-size: 9px; color: #fff; text-shadow: 2px 2px 0 var(--red-dark); }
        .profile-close { font-family: 'Press Start 2P', monospace; font-size: 8px; background: var(--red-dark); color: #fff; border: none; padding: 5px 8px; cursor: pointer; border-radius: 2px; }
        .profile-stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; padding: 12px; border-bottom: 1px solid #2a0000; }
        .profile-stat { background: #111; border: 1px solid #2a2a2a; border-radius: 4px; padding: 10px; text-align: center; }
        .profile-stat-label { font-size: 6px; color: #555; margin-bottom: 6px; letter-spacing: 0.5px; }
        .profile-stat-value { font-size: 11px; color: var(--red); }
        .profile-best { padding: 10px 14px; border-bottom: 1px solid #2a0000; display: flex; align-items: center; gap: 10px; }
        .profile-best-label { font-size: 6px; color: #555; margin-bottom: 4px; }
        .profile-best-name  { font-size: 9px; color: var(--rarity-legendary); }
        .profile-best-img   { width: 48px; height: 48px; object-fit: contain; image-rendering: pixelated; }
        .profile-rarity-bar { display: flex; gap: 6px; flex-wrap: wrap; padding: 10px 14px; border-bottom: 1px solid #2a0000; }
        .profile-catches-title { font-size: 7px; color: #555; padding: 8px 14px 4px; letter-spacing: 0.5px; }
        .profile-catches-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px; padding: 8px 12px 12px; }
        .profile-catch-card { background: #111; border: 1px solid #222; border-radius: 3px; padding: 6px 4px; text-align: center; position: relative; transition: border-color 0.15s; }
        .profile-catch-card:hover { border-color: var(--red); }
        .profile-catch-card img { width: 48px; height: 48px; object-fit: contain; image-rendering: pixelated; transition: transform 0.2s; }
        .profile-catch-card:hover img { transform: scale(1.1); }
        .profile-catch-name { font-size: 5.5px; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .profile-catch-val  { font-size: 7px; color: #666; margin-top: 2px; }
        .profile-catch-card .card-tooltip { display: none; position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--red); border-radius: 3px; padding: 7px 10px; font-size: 8px; color: #ccc; white-space: nowrap; z-index: 100; pointer-events: none; }
        .profile-catch-card:hover .card-tooltip { display: block; }

        /* Rarity bars (profile) */
        .profile-graph-section { padding: 12px 14px; border-top: 1px solid #2a0000; }
        .profile-graph-title { font-size: 7px; color: #555; letter-spacing: 0.5px; margin-bottom: 12px; }
        .rarity-bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .rarity-bar-label { font-size: 6px; width: 70px; min-width: 70px; letter-spacing: 0.5px; }
        .rarity-bar-track { flex: 1; height: 10px; background: #111; border-radius: 2px; overflow: hidden; border: 1px solid #222; }
        .rarity-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
        .rarity-bar-info { font-size: 6px; color: #555; min-width: 70px; text-align: right; white-space: nowrap; }

        /* Pokemon modal */
        .poke-modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88); z-index: 2000; align-items: center; justify-content: center; padding: 16px; }
        .poke-modal-overlay.open { display: flex; }
        .poke-modal { background: #1a0000; border: 3px solid var(--red); border-radius: 10px; width: 100%; max-width: 420px; overflow: hidden; }
        .poke-modal-header { background: var(--red); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid var(--red-dark); }
        .poke-modal-header span { font-size: 9px; color: #fff; text-shadow: 2px 2px 0 var(--red-dark); }
        .poke-modal-close { font-family: 'Press Start 2P', monospace; font-size: 7px; background: var(--red-dark); color: #fff; border: none; padding: 5px 8px; cursor: pointer; border-radius: 2px; }

<div class="wrap">

                    <div>
                        <div id="tradeTheirName" style="font-size:7px;margin-bottom:4px;"></div>
                        <div id="tradeTheirVal" style="font-size:6px;color:#ffae00;"></div>
                    </div>
                </div>
            </div>
            <div class="trade-section">
                <div class="trade-label">TU OFFRES (choisis) :</div>
                <div class="trade-search-wrap">
                    <input class="trade-search-input" type="text" id="tradeSearchInput"
                           placeholder="RECHERCHER UN POKEMON..."
                           oninput="filterTradeCards()">
                </div>
                <br>
                <div class="trade-cards" id="tradeMyCards"></div>
            </div>
            <div class="trade-preview" id="tradePreview" style="display:none;">
                <div class="trade-preview-side">
                    <img id="tradePreviewMine" class="trade-preview-img" src="">
                    <div id="tradePreviewMineName" class="trade-preview-name"></div>
                </div>
                <div class="trade-arrow">&#8652;</div>
                <div class="trade-preview-side">
                    <img id="tradePreviewTheirs" class="trade-preview-img" src="">
                    <div id="tradePreviewTheirsName" class="trade-preview-name"></div>
                </div>
            </div>
            <button class="trade-confirm-btn" id="tradeConfirmBtn" onclick="confirmTrade()" disabled>PROPOSER L'ÉCHANGE &#9658;</button>
        </div>
    </div>

    <!-- Copy Picker -->
    <div class="copy-picker-overlay" id="copyPickerOverlay" onclick="if(event.target===this)closeCopyPicker()">
        <div class="copy-picker-box">
            <div class="copy-picker-header">
                <span id="copyPickerTitle">CHOISIR L'EXEMPLAIRE</span>
                <button class="copy-picker-close" onclick="closeCopyPicker()">X</button>
            </div>
            <div class="copy-picker-list" id="copyPickerList"></div>
        </div>
    </div>

    <div class="bottombar">
        <span>&#127907; TWITCH FISHING EXPLORER</span>
        <span>SELECT &#9658; A &#9658; B</span>
    </div>

</div>
<script>
    const API      = 'https://pokedex-server-1-qslf.onrender.com';
    // ── GitHub Pages ──────────────────────────────────────────────────────────
    const CDN_GIF     = 'https://pikach44.github.io/pikach-sprites-gif';
    const CDN_PNG     = 'https://pikach44.github.io/pikach-sprites-png';
    const DEFAULT_IMG = `${CDN_PNG}/default.png`;

    function cldUrl(file, w, h) {
        const fileName = file.split('/').pop();
        const enc      = encodeURIComponent(fileName);
        const isPng    = fileName.toLowerCase().endsWith('.png');
        return isPng ? `${CDN_PNG}/${enc}` : `${CDN_GIF}/${enc}`;
    }

    let currentUser = null;

    // ─── AUTH TWITCH ───────────────────────────────────────────────────────────
    function loginTwitch() { window.location.href = `${API}/auth/twitch`; }

    function logoutTwitch() {
        localStorage.removeItem('jwt');
        currentUser = null;
        updateAuthUI();
    }

    function updateAuthUI() {
        const btn      = document.getElementById('authBtn');
        const tradeTab = document.getElementById('btn-trade');
        const btnMe    = document.getElementById('btnMe');
        if (currentUser) {
            btn.innerHTML = `<button class="btn-connected" onclick="logoutTwitch()">&#9679; ${currentUser.displayName}</button>`;
            document.getElementById('usernameInput').value = currentUser.username;
            if (btnMe) btnMe.style.display = '';
        } else {
            btn.innerHTML = `<button class="btn-twitch" onclick="loginTwitch()">&#9656; TWITCH</button>`;
            if (btnMe) btnMe.style.display = 'none';
        }
    }

    async function initAuth() {
        const params = new URLSearchParams(window.location.search);
        const token  = params.get('token');
        if (token) {
            localStorage.setItem('jwt', token);
            window.history.replaceState({}, '', window.location.pathname);
        }
        const saved = localStorage.getItem('jwt');
        if (saved) {
            try {
                const res = await fetch(`${API}/auth/me`, { headers: { 'Authorization': `Bearer ${saved}` } });
                if (res.ok) {
                    currentUser = await res.json();
                    updateAuthUI();
                    // Charger ses propres captures pour la pokeball
                    fetch(`${API}/catches/${currentUser.username}`)
                        .then(r => r.json())
                        .then(d => { myCatches = d.catches || []; })
                        .catch(() => {});
                    fetchAllData();
                    checkPendingTrades();
                    // Re-vérifier toutes les 30 secondes
                    setInterval(checkPendingTrades, 30000);
                } else {
                    localStorage.removeItem('jwt');
                    updateAuthUI();
                }
            } catch { updateAuthUI(); }
        }
    }

    let currentTab      = 'inv';
    let allPokemon      = [];
    let userCatches     = [];
    let myCatches       = []; // captures du joueur connecté, toujours à jour
    let currentGen      = 1;
    let leaderboardData = [];
    let lbSortKey       = 'totalValue';
    let isAllMode       = false;
    let activeRarity    = null;
    let activeDoublon   = false;
    let currentPage     = 0;
    let PAGE_SIZE       = parseInt(localStorage.getItem('pageSize') || '40');
    let tradeCardsCache       = [];
    let globalBestValuePerName  = {}; // meilleure valeur par pokemon toutes personnes confondues
    let globalWorstValuePerName = {}; // pire valeur par pokemon toutes personnes confondues

    const BORNES = ["Mew Shiny","Celebi","Deoxys Vitesse","Arceus Ténèbres","Genesect","Volcanion","Zeraora","Sylveroy"];
    const RARITY_ORDER  = { Junk:0, Common:1, Uncommon:2, Rare:3, Epic:4, Legendary:5 };
    const RARITY_COLORS = { Junk:'#888888', Common:'#dddddd', Uncommon:'#1fdf64', Rare:'#00d2ff', Epic:'#cc66ff', Legendary:'#ffae00' };

    document.addEventListener('DOMContentLoaded', () => {
        const sel = document.getElementById('pageSizeSelect');
        if (sel) sel.value = PAGE_SIZE;
    });

    // ─── RARETÉ ────────────────────────────────────────────────────────────────
    function getRarity(p) {
        if (p.catchRarity) return p.catchRarity;
        const found = allPokemon.find(pk => pk.name.toLowerCase() === (p.catchName || p.name || '').toLowerCase());
        const val = found ? (found.BaseValue || 0) : 0;
        if      (val >= 501) return 'Legendary';
        else if (val >= 200) return 'Epic';
        else if (val >= 60)  return 'Rare';
        else if (val >= 35)  return 'Uncommon';
        else if (val >= 15)  return 'Common';
        else                 return 'Junk';
    }

    // ─── FETCH ─────────────────────────────────────────────────────────────────
    async function fetchAll() {
        isAllMode = true; currentPage = 0;
        setStatus("CHARGEMENT DE TOUTES LES CAPTURES...");
        try {
            await ensurePokemonLoaded();
            const data = await (await fetch(`${API}/catches-all`)).json();
            userCatches = data.catches || [];
            updateStats(data);
            renderDisplay();
        } catch { setStatus("ERREUR SERVEUR."); }
    }

    async function fetchMe() {
        document.getElementById('usernameInput').value = currentUser.username;
        await fetchAllData();
    }

    async function fetchAllData() {
        const username = document.getElementById('usernameInput').value.trim();
        if (!username) return;
        isAllMode = false; currentPage = 0;
        setStatus(`RECHERCHE DE ${username.toUpperCase()}...`);
        try {
            await ensurePokemonLoaded();
            const data = await (await fetch(`${API}/catches/${username}`)).json();
            userCatches = data.catches || [];
            updateStats(data);
            renderDisplay();
        } catch { setStatus("ERREUR SERVEUR."); }
    }

    async function ensurePokemonLoaded() {
        if (allPokemon.length === 0)
            allPokemon = await (await fetch(`${API}/all-pokemon`)).json();
    }

    // ─── TABS ──────────────────────────────────────────────────────────────────
    function switchTab(type) {
        currentTab = type; activeRarity = null; activeDoublon = false;
        closeMainAutocomplete();
        const lbList = document.getElementById('lbAutocompleteList');
        if (lbList) { lbList.style.display = 'none'; lbAutoIndex = -1; }
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        const btnMap = { inv:'btn-inv', dex:'btn-dex', lb:'btn-lb', trade:'btn-trade' };
        document.getElementById(btnMap[type]).classList.add('active');
        document.getElementById('genBar').style.display       = type === 'dex'   ? 'flex' : 'none';
        document.getElementById('lbControls').style.display   = type === 'lb'    ? 'flex' : 'none';
        // Sous-menu échanges visible seulement si connecté + onglet trade
        document.getElementById('tradeSubMenu').style.display = (type === 'trade' && currentUser) ? 'flex' : 'none';
        document.querySelector('.search-row').style.display   = (type === 'lb' || type === 'trade') ? 'none' : 'flex';
        document.getElementById('minimalStats').style.display = type === 'trade' ? 'none' : (type === 'lb' ? 'none' : document.getElementById('minimalStats').style.display);
        // ✅ FIX : cacher invControls et pagination quand on quitte l'inventaire
        if (type === 'lb' || type === 'trade' || type === 'dex') {
            document.getElementById('invControls').style.display = 'none';
            document.getElementById('pagination').classList.remove('visible');
        }
        if (type === 'lb')         fetchLeaderboard();
        else if (type === 'trade') {
            document.getElementById('btn-trade').classList.remove('trade-pending');
            renderTradeTab();
        }
        else                       renderDisplay();
    }

    // ─── RENDER ────────────────────────────────────────────────────────────────
    function renderDisplay() {
        const container   = document.getElementById('mainContainer');
        container.innerHTML = '';
        const invControls = document.getElementById('invControls');

        if (currentTab === 'lb') {
            invControls.style.display = 'none';
            document.getElementById('pagination').classList.remove('visible');
            return;
        }

        if (currentTab === 'inv') {
            invControls.style.display = 'flex';
            if (userCatches.length === 0) { setStatus("AUCUNE CAPTURE TROUVÉE."); return; }

            const filter = document.getElementById('filterInput').value.trim().toLowerCase();
            const sort   = document.getElementById('sortSelect').value;

            if (filter !== (window._lastFilter||'') || sort !== (window._lastSort||'')) { currentPage = 0; }
            window._lastFilter = filter; window._lastSort = sort;

            // Calcule les doublons PAR personne
            const nameCountsPerUser = {};
            userCatches.forEach(c => {
                const user = (c.userName||'').toLowerCase();
                const name = (c.catchName||'').toLowerCase();
                const key  = user + '|' + name;
                nameCountsPerUser[key] = (nameCountsPerUser[key] || 0) + 1;
            });


            let filtered = userCatches.filter(p => {
                const matchName    = !filter        || (p.catchName||'').toLowerCase().includes(filter);
                const matchRarity  = !activeRarity  || getRarity(p) === activeRarity;
                const key          = (p.userName||'').toLowerCase() + '|' + (p.catchName||'').toLowerCase();
                const matchDoublon = !activeDoublon || nameCountsPerUser[key] > 1;
                return matchName && matchRarity && matchDoublon;
            });

            filtered.sort((a, b) => {
                switch(sort) {
                    case 'date-desc':   return new Date(b.timestamp) - new Date(a.timestamp);
                    case 'date-asc':    return new Date(a.timestamp) - new Date(b.timestamp);
                    case 'rarity-desc': return (RARITY_ORDER[getRarity(b)]||0) - (RARITY_ORDER[getRarity(a)]||0);
                    case 'rarity-asc':  return (RARITY_ORDER[getRarity(a)]||0) - (RARITY_ORDER[getRarity(b)]||0);
                    case 'value-desc':  return (b.catchValue||0) - (a.catchValue||0);
                    case 'value-asc':   return (a.catchValue||0) - (b.catchValue||0);
                    default: return 0;
                }
            });

            const total = filtered.reduce((s, p) => s + (p.catchValue||0), 0);
            document.getElementById('totalValue').innerHTML = `TOTAL: ${total} &#128176;`;

            const totalPages = Math.ceil(filtered.length / PAGE_SIZE);
            if (currentPage >= totalPages) currentPage = Math.max(0, totalPages - 1);
            const paginated = filtered.slice(currentPage * PAGE_SIZE, (currentPage + 1) * PAGE_SIZE);

            setStatus(`${filtered.length} / ${userCatches.length} CAPTURE(S).`);
            paginated.forEach(p => {
                const nameKey   = (p.catchName||'').toLowerCase();
                const bestEntry = globalBestValuePerName[nameKey];
                // Couronne si : cette carte est la meilleure valeur toutes personnes confondues
                // ET qu'au moins un autre user possède aussi ce pokemon
                // Couronne si :
                // 1. Pokemon détenu par 2+ joueurs différents ET c'est la meilleure valeur globale
                // 2. OU ce joueur a 2+ copies de ce pokemon ET c'est sa meilleure valeur
                const nameKey2      = (p.catchName||'').toLowerCase();
                const isBestCard    = bestEntry && String(p._id) === bestEntry.id;
                const isMultiOwned  = bestEntry && (bestEntry.ownerCount || 1) > 1;
                // Doublon chez ce même joueur ?
                const ownerName     = (p.userName||'').toLowerCase();
                const ownerCopies   = userCatches.filter(c =>
                    c.catchName.toLowerCase() === nameKey2 &&
                    (c.userName||'').toLowerCase() === ownerName
                );
                const isOwnerDoublon = ownerCopies.length > 1;
                const bestOwnerVal   = Math.max(...ownerCopies.map(c => c.catchValue || 0));
                const isBestOfOwner  = isOwnerDoublon && (p.catchValue || 0) === bestOwnerVal;
                p._isCrown = (isBestCard && isMultiOwned) || isBestOfOwner;

                // Caca : pire valeur parmi plusieurs joueurs
                const worstEntry    = globalWorstValuePerName[nameKey];
                const isWorstCard   = worstEntry && String(p._id) === worstEntry.id;
                const worstOwnerVal = ownerCopies.length > 0 ? Math.min(...ownerCopies.map(c => c.catchValue || 0)) : 0;
                const isWorstOfOwner = isOwnerDoublon && (p.catchValue || 0) === worstOwnerVal;
                p._isPoop = !p._isCrown && ((isWorstCard && isMultiOwned) || isWorstOfOwner);

                container.appendChild(createCard(p, true));
            });

            const pag = document.getElementById('pagination');
            if (filtered.length > PAGE_SIZE) {
                pag.classList.add('visible');
                document.getElementById('pageInfo').innerText = `${currentPage+1} / ${totalPages}`;
                document.getElementById('pagePrev').disabled = currentPage === 0;
                document.getElementById('pageNext').disabled = currentPage >= totalPages - 1;
            } else {
                pag.classList.remove('visible');
            }

        } else {
            invControls.style.display = 'none';
            document.getElementById('pagination').classList.remove('visible');
            document.getElementById('filterInput').value = '';
            setupGenBar();
            const slice = getGenSlice(currentGen);
            const owned = slice.filter(p => userCatches.some(c => c.catchName.toLowerCase() === p.name.toLowerCase()));
            setStatus(`${owned.length} POKÉMON SUR ${slice.length} DÉCOUVERTS.`);
            slice.forEach(p => {
                const isOwned = userCatches.some(c => c.catchName.toLowerCase() === p.name.toLowerCase());
                container.appendChild(createCard(p, isOwned));
            });
        }
    }

    // ─── CREATE CARD ───────────────────────────────────────────────────────────
    function createCard(p, isOwned) {
        const card     = document.createElement('div');
        const realName = p.catchName || p.name;
        const rarity   = getRarity(p);
        card.className = `card ${!isOwned ? 'not-owned' : ''}`;
        card.style.cursor = 'pointer';
        if (isOwned) card.onclick = () => openPokeModal(realName, rarity, p);

        const catchCount = isOwned ? userCatches.filter(c => c.catchName.toLowerCase() === realName.toLowerCase()).length : 0;
        // Pokeball : visible quand on regarde un autre joueur ou le pokédex
        // et qu'on possède déjà ce Pokémon (check par nom uniquement)
        const isMine     = isOwned && p.userName && currentUser && p.userName.toLowerCase() === currentUser.username.toLowerCase();
        const viewedUser = document.getElementById('usernameInput')?.value?.trim().toLowerCase();
        const isViewingOther = currentUser && viewedUser && viewedUser !== currentUser.username.toLowerCase();
        // ✅ FIX : utilise myCatches (mes propres captures) et pas userCatches
        // qui peut contenir les captures d'un autre joueur quand on filtre
        const alreadyOwn = currentUser && !isMine && (isAllMode || isViewingOther || currentTab === 'dex') &&
                           myCatches.some(c => c.catchName.toLowerCase() === realName.toLowerCase());

        let allCaptures = isOwned ? userCatches.filter(c => c.catchName.toLowerCase() === realName.toLowerCase()) : [];
        let tooltipHtml = '';
        if (isOwned && allCaptures.length > 0) {
            const lines = allCaptures.map(c => {
                const d = new Date(c.timestamp);
                return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
            }).join('<br>');
            const label = allCaptures.length > 1 ? `${allCaptures.length}x &#128197;<br>` : '';
            tooltipHtml = `<div class="card-tooltip">${label}${lines}</div>`;
        }

        let fileName = p.sprite || p.SpritePath || p.catchSprite || p.spritePath;
        if (!fileName || fileName === 'default.png') fileName = `${realName}.gif`;
        let spriteUrl;
        if (fileName.includes('PKmon/') || fileName.startsWith('v1')) {
            spriteUrl = `${CDN}/${fileName}`;
        } else {
            spriteUrl = cldUrl(fileName, 64, 64);
        }

        card.innerHTML = `
            ${tooltipHtml}
            ${catchCount > 1 ? `<div class="badge-count">x${catchCount}</div>` : ''}
            ${alreadyOwn ? '<div class="badge-owned" title="Tu possèdes ce Pokémon"></div>' : ''}
            <div class="corner-dot dot-${rarity}"></div>
            <div class="sprite-container">
                <img src="${spriteUrl}" loading="lazy"
                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
            </div>
            <div class="card-name rarity-${rarity}">${isOwned ? realName : '???'}</div>
            ${(isOwned && p.catchValue) ? `<div class="card-val">${p._isCrown ? '<span style="position:relative;top:-2px">👑</span> ' : p._isPoop ? '<span style="position:relative;top:-2px">💩</span> ' : ''}${p.catchValue}<span class="card-currency">₽</span></div>` : ''}
        `;

        if (isOwned && currentUser && p.userName &&
            currentUser.username.toLowerCase() !== p.userName.toLowerCase()) {
            const proposeBtn = document.createElement('button');
            if (p.tradeRefused) {
                proposeBtn.className = 'btn-radin';
                proposeBtn.innerText = '🔒 RADIN';
            } else {
                proposeBtn.className = 'btn-propose';
                proposeBtn.innerText = '⇄ ÉCHANGE';
                proposeBtn.onclick = (e) => {
                    e.stopPropagation();
                    openTradeModal(p._id, realName, p.sprite, p.catchValue, p.userName);
                };
            }
            card.appendChild(proposeBtn);
        }

        return card;
    }

    // ─── GEN ───────────────────────────────────────────────────────────────────
    function getGenSlice(gen) {
        let start = gen > 1 ? allPokemon.findIndex(p => p.name === BORNES[gen-2]) + 1 : 0;
        let end   = gen <= BORNES.length ? allPokemon.findIndex(p => p.name === BORNES[gen-1]) + 1 : allPokemon.length;
        return allPokemon.slice(start, end);
    }

    function setupGenBar() {
        const bar = document.getElementById('genBar');
        bar.innerHTML = '';
        for (let i = 1; i <= BORNES.length + 1; i++) {
            const isBonus = i === BORNES.length + 1;
            if (isBonus) {
                const hasOwned = getGenSlice(i).some(p => userCatches.some(c => c.catchName.toLowerCase() === p.name.toLowerCase()));
                if (!hasOwned) return;
            }
            const btn = document.createElement('button');
            btn.className = `gen-btn ${i === currentGen ? 'active' : ''}`;
            btn.innerText = isBonus ? 'BONUS' : `GEN ${i}`;
            btn.onclick   = () => { currentGen = i; renderDisplay(); };
            bar.appendChild(btn);
        }
    }

    // ─── STATS ─────────────────────────────────────────────────────────────────
    function filterByRarity(rarity) {
        activeRarity = (activeRarity === rarity) ? null : rarity;
        renderDisplay();
        document.querySelectorAll('.pill[data-rarity]').forEach(p => {
            p.style.opacity = (!activeRarity || p.dataset.rarity === activeRarity) ? '1' : '0.35';
            p.style.outline = p.dataset.rarity === activeRarity ? '2px solid #fff' : 'none';
        });
    }

    function updateStats(data) {
        document.getElementById('minimalStats').style.display = 'flex';
        document.getElementById('uniqueProgress').innerText = `POKÉDEX : ${data.uniqueCount||0} / 1029`;
        const rl = document.getElementById('rarityLine');
        // ✅ Ne PAS faire rl.innerHTML = '' — ça supprimerait le bouton DOUBLONS statique
        activeRarity  = null;
        activeDoublon = false;

        if (data.rarityStats) {
            // Vider uniquement les pills de rareté (pas le bouton doublon)
            rl.querySelectorAll('.pill[data-rarity]').forEach(p => p.remove());
            Object.entries(data.rarityStats).forEach(([rarity, count]) => {
                const span = document.createElement('span');
                span.className   = `pill pill-${rarity}`;
                span.dataset.rarity = rarity;
                span.style.cursor = 'pointer';
                span.innerHTML = `${rarity.toUpperCase().slice(0,3)}. ${count}`;
                span.onclick = () => filterByRarity(rarity);
                rl.appendChild(span);
            });
        }
        // Sync état visuel du bouton doublon
        const pill = document.getElementById('pillDoublon');
        if (pill) pill.classList.toggle('active', activeDoublon);
    }

    function toggleDoublon() {
        activeDoublon = !activeDoublon;
        const pill = document.getElementById('pillDoublon');
        if (pill) pill.classList.toggle('active', activeDoublon);
        // Désactiver le filtre rareté si on active doublon (et vice versa, optionnel)
        currentPage = 0;
        renderDisplay();
    }

    // ─── LEADERBOARD ───────────────────────────────────────────────────────────
    async function fetchLeaderboard() {
        setStatus("CHARGEMENT DU LEADERBOARD...");
        try {
            leaderboardData = await (await fetch(`${API}/leaderboard`)).json();
            renderLeaderboard();
        } catch { setStatus("ERREUR SERVEUR."); }
    }

    function sortLB(key) {
        lbSortKey = key;
        document.querySelectorAll('.lb-sort-btn').forEach(b => b.classList.remove('active'));
        const ids = { totalValue:'lb-btn-value', totalCaptures:'lb-btn-captures', uniqueCount:'lb-btn-unique', bestCatch:'lb-btn-best', avgValue:'lb-btn-avg', crownCount:'lb-btn-crown', poopCount:'lb-btn-poop' };
        if (ids[key]) document.getElementById(ids[key]).classList.add('active');
        renderLeaderboard();
    }

    // Calcule un "streak" visuel basé sur les captures totales
    function getStreakInfo(u, allUsers) {
        const max = Math.max(...allUsers.map(x => x.totalCaptures || 0));
        const ratio = max > 0 ? (u.totalCaptures || 0) / max : 0;
        if (ratio >= 0.75) return { label: '🔥🔥🔥', cls: 'hot',  tip: 'TRÈS ACTIF' };
        if (ratio >= 0.40) return { label: '🔥🔥',   cls: 'warm', tip: 'ACTIF' };
        if (ratio >= 0.15) return { label: '🔥',      cls: 'warm', tip: 'EN ROUTE' };
        return              { label: '❄️',      cls: 'cold', tip: 'INACTIF' };
    }

    function renderLeaderboard() {
        const container = document.getElementById('mainContainer');
        container.innerHTML = '';

        const searchVal = document.getElementById('lbSearchInput') ? document.getElementById('lbSearchInput').value.trim().toLowerCase() : '';
        const sorted    = [...leaderboardData].sort((a,b) => (b[lbSortKey]||0) - (a[lbSortKey]||0));
        const filtered  = searchVal ? sorted.filter(u => u.userName.toLowerCase().includes(searchVal)) : sorted;

        setStatus(`${filtered.length} DRESSEURS AU CLASSEMENT.`);
        if (filtered.length === 0) {
            const empty = document.createElement('div');
            empty.style.cssText = 'grid-column:1/-1;padding:30px;text-align:center;font-size:7px;color:#444';
            empty.innerText = 'AUCUN RÉSULTAT';
            container.appendChild(empty);
            return;
        }

        // ── Wrapper global (bypass le grid des cartes) ────────────────────────
        const lbWrap = document.createElement('div');
        lbWrap.style.cssText = 'grid-column:1/-1;width:100%;';
        container.appendChild(lbWrap);

        // ── STATS GLOBALES ────────────────────────────────────────────────────
        const totalCaptures   = leaderboardData.reduce((s, u) => s + (u.totalCaptures||0), 0);

    // ─── PROFILE ───────────────────────────────────────────────────────────────
    async function openProfile(username) {
        setStatus(`CHARGEMENT DU PROFIL DE ${username.toUpperCase()}...`);
        try {
            await ensurePokemonLoaded();
            const data    = await (await fetch(`${API}/catches/${username}`)).json();
            const catches = data.catches || [];

            document.getElementById('profileTitle').innerText = `PROFIL : ${username.toUpperCase()}`;

            const totalVal    = catches.reduce((s,c) => s+(c.catchValue||0), 0);
            const bestCatch   = catches.reduce((b,c) => (c.catchValue||0)>(b.catchValue||0)?c:b, {});
            const uniqueNames = [...new Set(catches.map(c => c.catchName))];

            document.getElementById('profileStats').innerHTML = `
                <div class="profile-stat"><div class="profile-stat-label">CAPTURES</div><div class="profile-stat-value">${catches.length}</div></div>
                <div class="profile-stat"><div class="profile-stat-label">UNIQUES</div><div class="profile-stat-value">${uniqueNames.length}</div></div>
                <div class="profile-stat"><div class="profile-stat-label">VALEUR TOTALE</div><div class="profile-stat-value" style="font-size:8px">${totalVal}₽</div></div>
                <div class="profile-stat"><div class="profile-stat-label">COMPLÉTION</div><div class="profile-stat-value" style="font-size:9px">${Math.round(uniqueNames.length/1029*100)}%</div></div>
            `;

            // ✅ FIX : q_auto + encodeURIComponent sur la meilleure capture
            const bestFile = bestCatch.sprite || `${bestCatch.catchName}.gif`;
            document.getElementById('profileBest').innerHTML = `
                <img class="profile-best-img" src="${cldUrl(bestFile, 48, 48)}"
                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                <div>
                    <div class="profile-best-label">MEILLEURE CAPTURE</div>
                    <div class="profile-best-name">${bestCatch.catchName||'?'}</div>
                    <div style="font-size:7px;color:#ffae00;margin-top:4px">${bestCatch.catchValue||0}₽</div>
                </div>
            `;

            const rarityStats = { Junk:0, Common:0, Uncommon:0, Rare:0, Epic:0, Legendary:0 };
            catches.forEach(c => { if (rarityStats.hasOwnProperty(c.catchRarity)) rarityStats[c.catchRarity]++; });
            document.getElementById('profileRarity').innerHTML = Object.entries(rarityStats)
                .map(([r,n]) => `<span class="pill pill-${r}">${r.slice(0,3).toUpperCase()}. ${n}</span>`).join('');

            const barsEl = document.getElementById('rarityBars');
            barsEl.innerHTML = '';
            Object.entries(rarityStats).forEach(([rarity, count]) => {
                const pct = catches.length > 0 ? Math.round(count/catches.length*100) : 0;
                const row = document.createElement('div');
                row.className = 'rarity-bar-row';
                row.innerHTML = `
                    <div class="rarity-bar-label rarity-${rarity}">${rarity.toUpperCase()}</div>
                    <div class="rarity-bar-track"><div class="rarity-bar-fill" style="width:0%;background:${RARITY_COLORS[rarity]}" data-width="${pct}%"></div></div>
                    <div class="rarity-bar-info">${count} <span style="color:#333">|</span> ${pct}%</div>
                `;
                barsEl.appendChild(row);
            });
            requestAnimationFrame(() => {
                barsEl.querySelectorAll('.rarity-bar-fill').forEach(b => { b.style.width = b.dataset.width; });
            });

            const catchesEl = document.getElementById('profileCatches');
            catchesEl.innerHTML = '';
            // ✅ FIX : q_auto + encodeURIComponent sur la grille des captures
            catches.slice(0,12).forEach(c => {
                const file   = c.sprite || `${c.catchName}.gif`;
                const rarity = c.catchRarity || 'Common';
                const div    = document.createElement('div');
                div.className    = 'profile-catch-card';
                div.style.cursor = 'pointer';
                div.onclick      = () => openPokeModal(c.catchName, getRarity(c), c);
                const allCaps = catches.filter(x => x.catchName.toLowerCase() === c.catchName.toLowerCase());
                const lines   = allCaps.map(x => {
                    const d = new Date(x.timestamp);
                    return d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
                }).join('<br>');
                div.innerHTML = `
                    <div class="card-tooltip">${allCaps.length>1?`${allCaps.length}x &#128197;<br>`:''}${lines}</div>
                    <img src="${cldUrl(file, 48, 48)}"
                         onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                    <div class="profile-catch-name rarity-${rarity}">${c.catchName}</div>
                    <div class="profile-catch-val">${c.catchValue||0}₽</div>
                `;
                catchesEl.appendChild(div);
            });

            document.getElementById('profileOverlay').classList.add('open');
            setStatus('');
        } catch { setStatus("ERREUR CHARGEMENT PROFIL."); }
    }

    // ─── POKEMON MODAL ─────────────────────────────────────────────────────────
    function openPokeModal(name, rarity, catchData) {
        // Nettoyer les éventuels boutons toggle précédents
        document.querySelectorAll('.poke-modal .trade-toggle-row').forEach(e => e.remove());
        const found = allPokemon.find(p => p.name.toLowerCase() === name.toLowerCase());

        let fileName = catchData ? (catchData.sprite || catchData.SpritePath || `${name}.gif`) : (found ? (found.SpritePath || `${name}.gif`) : `${name}.gif`);
        const spriteUrl = cldUrl(fileName, 190, 190);

        // ✅ FIX : précharge dans un objet Image invisible avant d'afficher
        const modalImg        = document.getElementById('pokeModalImg');
        const spriteContainer = modalImg.parentElement;

        modalImg.style.display = 'none';
        let loader = spriteContainer.querySelector('.modal-loader');
        if (!loader) {
            loader = document.createElement('div');
            loader.className = 'modal-loader';
            spriteContainer.appendChild(loader);
        }
        loader.style.display = 'block';

        const tempImg    = new Image();
        tempImg.onload   = function() {
            modalImg.src              = this.src;
            modalImg.style.display    = '';
            modalImg.style.opacity    = '0';
            modalImg.style.transition = 'opacity 0.25s';
            loader.style.display      = 'none';
            requestAnimationFrame(() => { modalImg.style.opacity = '1'; });
        };
        tempImg.onerror  = function() {
            modalImg.src           = DEFAULT_IMG;
            modalImg.style.display = '';
            modalImg.style.opacity = '1';
            loader.style.display   = 'none';
        };
        tempImg.src = spriteUrl;

        document.getElementById('pokeModalTitle').innerText = name.toUpperCase();
        document.getElementById('pokeModalName').className  = `poke-modal-name rarity-${rarity}`;
        document.getElementById('pokeModalName').innerText  = found ? (found.FullName || name) : name;
        document.getElementById('pokeModalDesc').innerText  = found ? (found.Description || '???') : '???';

        const baseVal    = found ? (found.BaseValue||0)  : (catchData ? catchData.catchValue  : 0);
        const baseWeight = found ? (found.BaseWeight||0) : (catchData ? catchData.catchWeight : 0);
        document.getElementById('pokeModalStats').innerHTML = `
            <div class="poke-modal-stat"><div class="poke-modal-stat-label">VALEUR</div><div class="poke-modal-stat-value rarity-${rarity}">${baseVal}₽</div></div>
            <div class="poke-modal-stat"><div class="poke-modal-stat-label">POIDS</div><div class="poke-modal-stat-value" style="color:#aaa">${baseWeight} kg</div></div>
            <div class="poke-modal-stat"><div class="poke-modal-stat-label">RARETÉ</div><div class="poke-modal-stat-value rarity-${rarity}">${rarity.toUpperCase()}</div></div>
        `;

        // Bouton toggle refus d'échange si c'est MON pokemon
        const myVersions = currentUser
            ? userCatches.filter(c =>
                c.catchName.toLowerCase() === name.toLowerCase() &&
                c.userName && c.userName.toLowerCase() === currentUser.username.toLowerCase()
              )
            : [];
        if (myVersions.length > 0 && catchData && catchData._id) {
            const isRefused = catchData.tradeRefused || false;
            const toggleBtn = document.createElement('div');
            toggleBtn.className = 'trade-toggle-row';
            toggleBtn.style.cssText = 'padding:10px 14px;border-bottom:1px solid #2a0000;display:flex;align-items:center;gap:10px;';
            toggleBtn.innerHTML = `
                <span style="font-size:6px;color:#555;letter-spacing:0.5px;flex:1">ÉCHANGES SUR CE POKÉMON :</span>
                <button id="tradeToggleBtn" class="btn-toggle-trade ${isRefused ? 'closed' : 'open'}"
                        onclick="toggleTradeRefused('${catchData._id}', this)">
                    ${isRefused ? '🔒 REFUSÉ' : '✅ AUTORISÉ'}
                </button>
            `;
            document.querySelector('.poke-modal').insertBefore(
                toggleBtn,
                document.getElementById('pokeModalFooter')
            );
        }

        const footerEl       = document.getElementById('pokeModalFooter');
        const catchersOfThis = userCatches.filter(c => c.catchName.toLowerCase() === name.toLowerCase());
        if (isAllMode && catchersOfThis.length > 0) {
            const byUser = {};
            catchersOfThis.forEach(c => { if (!byUser[c.userName]) byUser[c.userName]=[]; byUser[c.userName].push(c); });
            footerEl.style.textAlign = 'left';
            footerEl.style.padding   = '10px 14px';
            let html = `<div style="font-size:6px;color:#555;margin-bottom:6px;letter-spacing:0.5px;">CAPTURÉ PAR :</div>`;
            Object.entries(byUser).forEach(([user, caps]) => {
                caps.forEach(c => {
                    const d = new Date(c.timestamp);
                    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:8px;">
                        <span style="font-size:7px;color:#fff">${user}</span>
                        <span style="font-size:6px;color:#555">${d.toLocaleDateString('fr-FR')} ${d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}</span>
                        <span style="font-size:7px;color:var(--rarity-legendary)">${c.catchValue||0}₽</span>
                    </div>`;
                });
            });
            footerEl.innerHTML = html;
        } else if (catchersOfThis.length > 0) {
            footerEl.style.textAlign = 'center';
            footerEl.innerHTML = `CAPTURÉ ${catchersOfThis.length} FOIS`;
        } else {
            footerEl.innerHTML = '';
        }

        document.getElementById('pokeModalOverlay').classList.add('open');
    }

    // ─── AUTOCOMPLETE BARRE PRINCIPALE ──────────────────────────────────────────
    let mainAutoIndex = -1;

    function onMainSearch() {
        mainAutoIndex = -1;
        showMainAutocomplete();
    }

    function showMainAutocomplete() {
        const input   = document.getElementById('usernameInput');
        const list    = document.getElementById('mainAutocompleteList');
        const val     = input.value.trim().toLowerCase();

        if (!val || leaderboardData.length === 0) {
            list.style.display = 'none';
            return;
        }

        const matches = leaderboardData
            .filter(u => u.userName.toLowerCase().includes(val))
            .sort((a, b) => (b.totalValue||0) - (a.totalValue||0))
            .slice(0, 6);

        if (matches.length === 0) { list.style.display = 'none'; return; }

        list.innerHTML = '';
        matches.forEach((u, i) => {
            const spriteUrl   = cldUrl(u.bestCatchSprite || `${u.bestCatchName}.gif`, 20, 20);
            const name        = u.userName;
            const idx         = name.toLowerCase().indexOf(val);
            const highlighted = idx >= 0
                ? name.slice(0, idx) +
                  `<span class="lb-autocomplete-highlight">${name.slice(idx, idx + val.length)}</span>` +
                  name.slice(idx + val.length)
                : name;

            const item = document.createElement('div');
            item.className   = 'lb-autocomplete-item';
            item.dataset.idx = i;
            item.innerHTML   = `
                <img src="${spriteUrl}" onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                <span>${highlighted}</span>
                <span style="color:#555;font-size:5px;margin-left:auto">${u.totalValue||0}₽</span>
            `;
            item.onmousedown = (e) => {
                e.preventDefault();
                selectMainAutocomplete(u.userName);
            };
            list.appendChild(item);
        });

        list.style.display = 'block';
        list.style.width   = input.offsetWidth + 'px';
    }

    function selectMainAutocomplete(name) {
        document.getElementById('usernameInput').value = name;
        closeMainAutocomplete();
        fetchAllData();
    }

    function closeMainAutocomplete() {
        const list = document.getElementById('mainAutocompleteList');
        if (list) list.style.display = 'none';
        mainAutoIndex = -1;
    }

    function onMainSearchKey(e) {
        const list  = document.getElementById('mainAutocompleteList');
        const items = list.querySelectorAll('.lb-autocomplete-item');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            mainAutoIndex = Math.min(mainAutoIndex + 1, items.length - 1);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            mainAutoIndex = Math.max(mainAutoIndex - 1, -1);
        } else if (e.key === 'Enter' && mainAutoIndex >= 0) {
            e.preventDefault();
            selectMainAutocomplete(items[mainAutoIndex].querySelector('span').textContent);
            return;
        } else if (e.key === 'Escape') {
            closeMainAutocomplete();
            return;
        }

        items.forEach((item, i) => {
            item.classList.toggle('active', i === mainAutoIndex);
        });
    }

            e.preventDefault();

        } else if (e.key === 'Enter' && lbAutoIndex >= 0) {
            e.preventDefault();
            selectLbAutocomplete(items[lbAutoIndex].querySelector('span').textContent);
            return;
        } else if (e.key === 'Escape') {
            list.style.display = 'none';
            lbAutoIndex = -1;
            return;
        }

        items.forEach((item, i) => {
            item.classList.toggle('active', i === lbAutoIndex);
        });
    }

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.lb-autocomplete-wrap')) {
            const list = document.getElementById('lbAutocompleteList');
            if (list) list.style.display = 'none';
            lbAutoIndex = -1;
        }
        if (!e.target.closest('.search-autocomplete-wrap')) {
            closeMainAutocomplete();
        }
    });

    // Précharger leaderboard pour l'autocomplete

    // Précharger globalBestValuePerName depuis toutes les captures
    fetch(`${API}/catches-all`).then(r => r.json()).then(data => {
        const all = data.catches || [];
        globalBestValuePerName = {};
        globalWorstValuePerName = {};
        const ownerSets = {};
        all.forEach(c => {
            const name = (c.catchName||'').toLowerCase();
            const val  = c.catchValue || 0;
            if (!globalBestValuePerName[name] || val > globalBestValuePerName[name].val) {
                globalBestValuePerName[name] = { val, id: String(c._id), userName: c.userName };
            }
            if (!globalWorstValuePerName[name] || val < globalWorstValuePerName[name].val) {
                globalWorstValuePerName[name] = { val, id: String(c._id), userName: c.userName };
            }
            if (!ownerSets[name]) ownerSets[name] = new Set();
            ownerSets[name].add((c.userName||'').toLowerCase());
        });
        Object.keys(globalBestValuePerName).forEach(name => {
            const count = ownerSets[name] ? ownerSets[name].size : 1;
            globalBestValuePerName[name].ownerCount  = count;
            globalWorstValuePerName[name].ownerCount = count;
        });
    }).catch(() => {});

    async function checkPendingTrades() {

        try {

    let tradeTarget     = null;
    let tradeSelectedId = null;

    // ✅ FIX : tradeSprite utilise cldUrl partout
    function tradeSprite(sprite, name) {
        if (!sprite || sprite === 'default.png') return cldUrl(`${name}.gif`, 64, 64);
        if (sprite.includes('PKmon/') || sprite.startsWith('v1')) return `${CDN}/${sprite}`;
        return cldUrl(sprite, 64, 64);
    }

    function openTradeModal(toCatchId, toCatchName, toSprite, toValue, toUser) {
        if (!currentUser) { alert('Connecte-toi avec Twitch pour proposer un échange !'); return; }
        if (currentUser.username.toLowerCase() === toUser.toLowerCase()) { alert('Tu ne peux pas échanger avec toi-même !'); return; }

        tradeTarget     = { catchId: toCatchId, catchName: toCatchName, sprite: toSprite, value: toValue, toUser };
        tradeSelectedId = null;

        document.getElementById('tradeTitle').innerText       = `ÉCHANGE AVEC ${toUser.toUpperCase()}`;
        document.getElementById('tradeTheirName').innerText   = toCatchName;
        document.getElementById('tradeTheirVal').innerHTML    = `${toValue}₽`;
        document.getElementById('tradeTheirSprite').src       = tradeSprite(toSprite, toCatchName);
        document.getElementById('tradePreview').style.display = 'none';
        document.getElementById('tradeConfirmBtn').disabled   = true;
        document.getElementById('tradeSearchInput').value     = '';

        const myCards = document.getElementById('tradeMyCards');
        myCards.innerHTML = '<div style="font-size:6px;color:#444;padding:10px;">Chargement...</div>';

        fetch(`${API}/catches/${currentUser.username}`)
            .then(r => r.json())
            .then(data => {
                const catches = data.catches || [];
                if (catches.length === 0) {
                    myCards.innerHTML = '<div class="trade-empty">AUCUNE CAPTURE DISPONIBLE</div>';
                    tradeCardsCache = [];
                    return;
                }
                const grouped = {};
                catches.forEach(c => {
                    const key = c.catchName.toLowerCase();
                    if (!grouped[key]) grouped[key] = [];
                    grouped[key].push(c);
                });
                tradeCardsCache = Object.values(grouped).sort((a, b) => {
                    const ra = RARITY_ORDER[a[0].catchRarity||'Common'] || 0;
                    const rb = RARITY_ORDER[b[0].catchRarity||'Common'] || 0;
                    if (rb !== ra) return rb - ra;
                    return (b[0].catchValue||0) - (a[0].catchValue||0);
                });
                renderTradeCards('');
            });

        document.getElementById('tradeOverlay').classList.add('open');
    }

    function renderTradeCards(filter) {
        const myCards = document.getElementById('tradeMyCards');
        myCards.innerHTML = '';
        const filtered = filter
            ? tradeCardsCache.filter(copies => copies[0].catchName.toLowerCase().includes(filter))
            : tradeCardsCache;
        if (filtered.length === 0) { myCards.innerHTML = '<div class="trade-empty">AUCUN RÉSULTAT</div>'; return; }

        filtered.forEach(copies => {
            const c   = copies[0];
            const div = document.createElement('div');
            div.className = 'trade-card';
            div.innerHTML = `
                ${copies.length > 1 ? `<div class="trade-card-badge">x${copies.length}</div>` : ''}
                <img src="${tradeSprite(c.sprite, c.catchName)}"
                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                <div class="trade-card-name rarity-${c.catchRarity||'Common'}">${c.catchName}</div>
                <div class="trade-card-val">${c.catchValue||0}₽</div>
            `;
            div.onclick = () => {
                if (copies.length === 1) {
                    document.querySelectorAll('.trade-card').forEach(d => d.classList.remove('selected'));
                    div.classList.add('selected');
                    selectMyCard(copies[0]);
                } else {
                    openCopyPicker(copies, div);
                }
            };
            myCards.appendChild(div);
        });
    }

    function filterTradeCards() {
        const val = document.getElementById('tradeSearchInput').value.trim().toLowerCase();
        renderTradeCards(val);
    }

    function selectMyCard(c) {
        tradeSelectedId = c._id;
        document.getElementById('tradePreviewMine').src            = tradeSprite(c.sprite, c.catchName);
        document.getElementById('tradePreviewMineName').innerText   = c.catchName;
        document.getElementById('tradePreviewTheirs').src           = tradeSprite(tradeTarget.sprite, tradeTarget.catchName);
        document.getElementById('tradePreviewTheirsName').innerText = tradeTarget.catchName;
        document.getElementById('tradePreview').style.display       = 'flex';
        document.getElementById('tradeConfirmBtn').disabled          = false;
    }

    function openCopyPicker(copies, parentDiv) {
        document.getElementById('copyPickerTitle').innerText = `${copies[0].catchName.toUpperCase()} — CHOISIR L'EXEMPLAIRE`;
        const list = document.getElementById('copyPickerList');
        list.innerHTML = '';
        copies.forEach((c, i) => {
            const d    = new Date(c.timestamp);
            const date = d.toLocaleDateString('fr-FR') + ' ' + d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            const item = document.createElement('div');
            item.className = 'copy-picker-item';
            item.innerHTML = `
                <img src="${tradeSprite(c.sprite, c.catchName)}"
                     onerror="this.onerror=null;this.src='${DEFAULT_IMG}'">
                <div class="copy-picker-item-info">
                    <div class="copy-picker-item-name rarity-${c.catchRarity||'Common'}">${c.catchName}</div>
                    <div class="copy-picker-item-date">📅 ${date}</div>
                    <div class="copy-picker-item-val">${c.catchValue||0}₽</div>
                </div>
                <div class="copy-picker-item-num">N°${i+1}</div>
            `;
            item.onclick = () => {
                closeCopyPicker();
                document.querySelectorAll('.trade-card').forEach(d => d.classList.remove('selected'));
                if (parentDiv) parentDiv.classList.add('selected');

        });
        document.getElementById('copyPickerOverlay').classList.add('open');
    }

    function closeCopyPicker() { document.getElementById('copyPickerOverlay').classList.remove('open'); }

    async function confirmTrade() {
        if (!tradeSelectedId || !tradeTarget) return;
        document.getElementById('tradeConfirmBtn').disabled = true;
        try {
            const res  = await fetch(`${API}/trade/propose`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('jwt')}` },
                body: JSON.stringify({ fromCatchId: tradeSelectedId, toCatchId: tradeTarget.catchId, toUser: tradeTarget.toUser })
            });
            const data = await res.json();
            if (data.success) {
                closeTradeModalBtn();
                alert(`Proposition d'échange envoyée à ${tradeTarget.toUser} !`);
            } else {
                alert('Erreur : ' + (data.error || 'Inconnue'));
                document.getElementById('tradeConfirmBtn').disabled = false;
            }
        } catch {
            alert('Erreur serveur');
            document.getElementById('tradeConfirmBtn').disabled = false;
        }
    }

    function closeTradeModal(e) { if (e.target === document.getElementById('tradeOverlay')) closeTradeModalBtn(); }
    function closeTradeModalBtn() { document.getElementById('tradeOverlay').classList.remove('open'); }

    // ─── Onglet ÉCHANGES ──────────────────────────────────────────────────────
    let tradeView = 'public'; // 'mine' ou 'public'

    async function renderTradeTab(view) {
        if (view) tradeView = view;
        const container = document.getElementById('mainContainer');
        container.innerHTML = '';
        document.getElementById('invControls').style.display = 'none';
        document.getElementById('pagination').classList.remove('visible');

        if (currentUser) {

            document.getElementById('btn-trade-public').classList.toggle('active', tradeView === 'public');
        }

        // Vue publique — accessible à tous
        if (!currentUser || tradeView === 'public') {
            pubPokemonFilter = ''; pubUserFilter = ''; pubRarityFilter = '';
            await renderPublicTrades(container, 0, '', '', '');
            return;
        }

        setStatus('CHARGEMENT DES ÉCHANGES...');
        try {
            const res  = await fetch(`${API}/trade/pending/${currentUser.username}`, {
                headers: { 'Authorization': `Bearer ${localStorage.getItem('jwt')}` }
            });

            setStatus('');

            if (data.received.length === 0) {
                receivedSection.innerHTML += '<div class="trade-empty">AUCUN ÉCHANGE REÇU</div>';

                data.received.forEach(t => receivedSection.appendChild(createTradeItem(t, 'received')));

            sentSection.className = 'trade-tab-section';

            } else {
                data.sent.forEach(t => sentSection.appendChild(createTradeItem(t, 'sent')));
            }
            container.appendChild(sentSection);

            await renderHistorySection(container, 0);

        } catch { setStatus('ERREUR CHARGEMENT ÉCHANGES.'); }
